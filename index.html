<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Registration</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    padding:30px;
}

.container{
    width:100%;
    max-width:600px;
    background:rgba(255,255,255,.18);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.25);
    border-radius:20px;
    padding:35px;
    box-shadow:0 20px 40px rgba(0,0,0,.2);
}

h1{
    text-align:center;
    color:white;
    margin-bottom:25px;
    font-weight:600;
}

label{
    display:block;
    color:white;
    margin-bottom:8px;
    margin-top:18px;
    font-weight:500;
}

input,
textarea,
select{
    width:100%;
    padding:14px;
    border:none;
    outline:none;
    border-radius:12px;
    background:rgba(255,255,255,.85);
    font-size:15px;
}

textarea{
    resize:vertical;
    min-height:90px;
}

.phone-group{
    display:flex;
    gap:10px;
}

.phone-group select{
    width:35%;
}

.phone-group input{
    width:65%;
}

button{
    width:100%;
    margin-top:30px;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#ffffff;
    color:#0078ff;
    font-size:17px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:translateY(-2px);
}

.message{
    margin-top:20px;
    text-align:center;
    color:white;
    font-weight:500;
}
</style>

</head>
<body>

<div class="container">

<h1>Student Registration</h1>

<form id="studentForm">

<label>Student Name</label>
<input
type="text"
id="name"
required
placeholder="Enter student name">

<label>Date of Birth</label>
<input
type="date"
id="dob"
required>

<label>Address</label>
<textarea
id="address"
required
placeholder="Enter complete address"></textarea>

<label>Phone Number</label>

<div class="phone-group">

<select id="countryCode">

<option value="+91" selected>🇮🇳 India (+91)</option>
<option value="+1">🇺🇸 USA (+1)</option>
<option value="+44">🇬🇧 UK (+44)</option>
<option value="+61">🇦🇺 Australia (+61)</option>
<option value="+971">🇦🇪 UAE (+971)</option>
<option value="+880">🇧🇩 Bangladesh (+880)</option>
<option value="+977">🇳🇵 Nepal (+977)</option>
<option value="+94">🇱🇰 Sri Lanka (+94)</option>
<option value="+81">🇯🇵 Japan (+81)</option>
<option value="+49">🇩🇪 Germany (+49)</option>

</select>

<input
type="tel"
id="phone"
required
placeholder="9876543210"
pattern="[0-9]{5,15}">

</div>

<button type="submit">Submit</button>

</form>

<div class="message" id="message"></div>

</div>

<script>

const webhookURL = "https://muskan.ifsjaipur.cloud/app/form";

document.getElementById("studentForm").addEventListener("submit", async function(e){

    e.preventDefault();

    const payload = {

        name: document.getElementById("name").value,

        dateOfBirth: document.getElementById("dob").value,

        address: document.getElementById("address").value,

        countryCode: document.getElementById("countryCode").value,

        phoneNumber: document.getElementById("phone").value,

        fullPhoneNumber:
            document.getElementById("countryCode").value +
            document.getElementById("phone").value

    };

    const message=document.getElementById("message");

    try{

        const response = await fetch(webhookURL,{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify(payload)
        });

        if(response.ok){

            message.innerHTML="✅ Student details submitted successfully.";

            document.getElementById("studentForm").reset();

            document.getElementById("countryCode").value="+91";

        }else{

            message.innerHTML="❌ Failed to submit.";

        }

    }catch(err){

        message.innerHTML="❌ Unable to connect to server.";

    }

});

</script>

</body>
</html>
